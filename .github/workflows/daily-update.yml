name: 每日自动更新数据

on:
  schedule:
    # 每天早上9点（北京时间）自动运行
    # GitHub Actions使用UTC时间，北京时间-8小时 = UTC 1点
    - cron: '0 1 * * *'
  
  # 也可以手动触发
  workflow_dispatch:

jobs:
  update-data:
    runs-on: ubuntu-latest
    
    steps:
      - name: 检出代码
        uses: actions/checkout@v3
      
      - name: 设置Python环境
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
      
      - name: 安装依赖
        run: |
          pip install pandas openpyxl requests
      
      - name: 下载基期数据
        run: |
          # 这里需要您把基期文件放到GitHub仓库
          # 或者从其他地方下载
          echo "基期数据已准备"
      
      - name: 下载看板数据
        run: |
          # TODO: 这里需要自动从快手BI下载数据
          # 可能需要API或其他自动化方式
          echo "看板数据下载"
      
      - name: 运行上传脚本
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: |
          python3 upload_to_web.py
      
      - name: 发送通知
        if: failure()
        run: |
          echo "数据更新失败，请检查"
